openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Optics API - Attribution Engine & Leads Dashboard
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: tenants
    description: Tenant management
  - name: leads
    description: Lead management
  - name: campaigns
    description: Campaign and ad spend data
  - name: attribution
    description: Attribution events and matching
  - name: jobs
    description: ServiceTitan job/revenue data
  - name: webhooks
    description: Webhook ingestion endpoints
  - name: dashboard
    description: Dashboard analytics and KPIs
  - name: auth
    description: Authentication
  - name: admin
    description: Admin portal management
  - name: training
    description: Training & LMS upsell engine
  - name: podium
    description: Podium messaging integration (texts, calls, unified timeline)

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /tenants:
    get:
      operationId: listTenants
      tags: [tenants]
      summary: List all tenants
      responses:
        "200":
          description: List of tenants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tenant"
    post:
      operationId: createTenant
      tags: [tenants]
      summary: Create a new tenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTenantInput"
      responses:
        "201":
          description: Tenant created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"

  /tenants/{tenantId}:
    get:
      operationId: getTenant
      tags: [tenants]
      summary: Get tenant by ID
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tenant details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
    patch:
      operationId: updateTenant
      tags: [tenants]
      summary: Update a tenant
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTenantInput"
      responses:
        "200":
          description: Updated tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
    delete:
      operationId: deleteTenant
      tags: [tenants]
      summary: Soft-delete (deactivate) a tenant
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tenant deactivated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string

  /leads/hud/queue:
    get:
      operationId: getHudQueue
      tags: [leads]
      summary: Get lead HUD focus queue (new, follow-ups, background)
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Categorized lead queue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HudQueueResponse"

  /leads/hud/stats:
    get:
      operationId: getHudStats
      tags: [leads]
      summary: Get lead coordinator performance stats for today
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: HUD performance statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HudStats"

  /leads:
    get:
      operationId: listLeads
      tags: [leads]
      summary: List leads with optional filters
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [new, contacted, booked, sold, lost, cancelled]
        - name: source
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: funnelId
          in: query
          schema:
            type: integer
        - name: startDate
          in: query
          schema:
            type: string

        - name: endDate
          in: query
          schema:
            type: string

      responses:
        "200":
          description: List of leads
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadListResponse"

  /leads/{leadId}:
    get:
      operationId: getLead
      tags: [leads]
      summary: Get lead by ID
      parameters:
        - name: leadId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lead details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
    patch:
      operationId: updateLead
      tags: [leads]
      summary: Update lead status or details
      parameters:
        - name: leadId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLeadInput"
      responses:
        "200":
          description: Updated lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"

  /leads/{leadId}/invoice:
    get:
      operationId: getLeadInvoice
      tags: [leads]
      summary: Get the most recent invoiced job linked to a lead
      description: |
        Returns header-level invoice fields from the most recent invoiced
        ServiceTitan job linked to this lead. Used by the attribution page
        drawer to show what was actually sold. Returns 404 if the lead has
        no linked job with `hasInvoice = true`.
      parameters:
        - name: leadId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invoice header detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadInvoiceDetail"
        "404":
          description: Lead not found or has no invoiced job

  /podium/conversations/{leadId}:
    get:
      operationId: getPodiumConversation
      tags: [podium]
      summary: Get the Podium SMS/text conversation for a lead
      description: |
        Returns the cached Podium messages for a single lead, filtered to
        text-style channels (call rows are excluded — those are exposed via
        `/podium/timeline/{leadId}` instead). Each request first attempts a
        best-effort sync with the Podium API for the lead's phone number,
        then returns the resulting `podium_messages` rows ordered newest
        first along with the conversation UID and a deep link into the
        Podium inbox. When the lead has no phone number the response
        carries an empty `messages` array; when no Podium-connected user
        is available for the tenant the response also sets
        `notConnected: true`.
      parameters:
        - name: leadId
          in: path
          required: true
          schema:
            type: integer
        - name: tenantId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Cached Podium messages plus conversation metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PodiumConversationResponse"

  /podium/messages:
    post:
      operationId: sendPodiumMessage
      tags: [podium]
      summary: Send an outbound text to a lead via Podium
      description: |
        Sends an outbound SMS/text to the lead's phone number through the
        Podium API using the tenant's connected Podium user, persists the
        sent message into `podium_messages`, and broadcasts a
        `podium-message` socket event to the tenant. Fails when the lead
        has no phone number or the tenant has no Podium-connected user.
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendPodiumMessageInput"
      responses:
        "200":
          description: The persisted outbound message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendPodiumMessageResponse"

  /podium/users:
    get:
      operationId: getPodiumUsers
      tags: [podium]
      summary: List Podium users alongside the tenant's team members
      description: |
        Returns the Podium organisation's users (as fetched live from the
        Podium API using the tenant's connected user) joined with the
        tenant's active internal team members. Each Podium user entry is
        enriched with the linked internal user, if any, so the Settings
        UI can render a single mapping table. When the tenant has no
        Podium-connected user the `podiumUsers` array is empty and
        `notConnected` is `true`.
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Podium users, internal team members and link state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PodiumUsersResponse"

  /podium/users/link:
    post:
      operationId: linkPodiumUser
      tags: [podium]
      summary: Link or unlink a Podium user to an internal team member
      description: |
        Sets (or clears, when `podiumUserUid` is `null`) the
        `podium_user_uid` for an internal user in the current tenant.
        Restricted to managers (`super_admin`, `agency_user`,
        `client_admin`). Returns 409 if the requested Podium UID is
        already linked to a different team member in the tenant.
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LinkPodiumUserInput"
      responses:
        "200":
          description: Link succeeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /podium/timeline/{leadId}:
    get:
      operationId: getPodiumTimeline
      tags: [podium]
      summary: Get the unified Pulse + Podium timeline for a lead
      description: |
        Returns a chronological feed (newest first) that merges native
        Pulse call attempts with Podium-sourced messages and calls for a
        single lead. Each entry is discriminated by `type`
        (`pulse_action`, `podium_text`, `podium_call`); the entry's
        non-common fields are populated only for the matching variant.

        Pulse-action entries mirror the same call-attempt projection
        used by `/leads-hub/{leadId}/history` (`HistoryEntry`), with
        `attemptedAt` exposed as the unified `timestamp` field. Podium
        entries are read from the locally cached `podium_messages` rows
        after a best-effort sync with the Podium API; when the lead has
        no phone number or no connected Podium user, the Podium portion
        is empty.
      parameters:
        - name: leadId
          in: path
          required: true
          schema:
            type: integer
        - name: tenantId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Unified timeline entries for the lead, newest first
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PodiumTimelineResponse"

  /leads-hub/{leadId}/status-history:
    get:
      operationId: getLeadStatusHistory
      tags: [leads]
      summary: Get the durable hub-status transition audit trail for a lead
      description: |
        Returns every `lead_status_history` row recorded against the lead
        in ascending chronological order, scoped to the lead's tenant.
        Each row captures a single hub-status transition (`from_status` →
        `to_status`), who drove it (or `null` for system-driven changes),
        when it happened, and an optional reason string. This is the
        append-only audit log surfaced alongside the call-attempt
        timeline so CSRs and admins can see exactly how a lead moved
        through statuses (e.g. day_1 → call_back → appt_set → dead →
        appt_set).
      parameters:
        - name: leadId
          in: path
          required: true
          schema:
            type: integer
        - name: tenantId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Ordered status-history rows for the lead, oldest first
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadStatusHistoryResponse"

  /leads-hub/{leadId}/history:
    get:
      operationId: getLeadHistory
      tags: [leads]
      summary: Get the action history (call attempts, texts, voicemails) for a lead
      description: |
        Returns the chronological action history for a single lead in the
        leads-hub workflow. Each entry corresponds to a `call_attempts` row
        for the lead, joined with the acting CSR's display name. Entries
        may carry follow-up state pulled from the parent lead row
        (`spokeResult`, `callbackAt`, `appointmentDate`, `appointmentTime`)
        when the action drove a callback or appointment booking; otherwise
        those fields are null.
      parameters:
        - name: leadId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: History entries for the lead, newest first
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadHistoryResponse"

  /campaigns:
    get:
      operationId: listCampaigns
      tags: [campaigns]
      summary: List campaigns
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
        - name: platform
          in: query
          schema:
            type: string
            enum: [google, meta]
      responses:
        "200":
          description: List of campaigns
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Campaign"

  /campaigns/stats:
    get:
      operationId: getCampaignStats
      tags: [campaigns]
      summary: Get aggregated campaign stats
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
        - name: startDate
          in: query
          schema:
            type: string

        - name: endDate
          in: query
          schema:
            type: string

      responses:
        "200":
          description: Aggregated campaign statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignStatsResponse"

  /campaigns/meta-summary:
    get:
      operationId: getMetaCampaignSummary
      tags: [campaigns]
      summary: List Meta campaigns with aggregated stats for a date range
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Meta campaigns with summary stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MetaCampaignSummaryRow"

  /campaigns/{campaignId}/breakdown:
    get:
      operationId: getMetaCampaignBreakdown
      tags: [campaigns]
      summary: Get ad-set + ad breakdown for a Meta campaign
      parameters:
        - name: campaignId
          in: path
          required: true
          schema:
            type: integer
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Ad-set and ad breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetaCampaignBreakdownResponse"
        "404":
          description: Campaign not found

  /attribution/events:
    get:
      operationId: listAttributionEvents
      tags: [attribution]
      summary: List attribution events
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
        - name: matchLevel
          in: query
          schema:
            type: string
            enum: [diamond, golden, silver, bronze, manual, unmatched]
        - name: eventType
          in: query
          schema:
            type: string
            enum: [click, call, form_fill]
        - name: source
          in: query
          schema:
            type: string
        - name: funnel
          in: query
          schema:
            type: string
        - name: dateRange
          in: query
          schema:
            type: string
            enum: ["1d", "7d", "30d"]
        - name: subdomainRule
          in: query
          schema:
            type: string
          description: Filter by subdomain rule subdomain, or `__none__` for events without a matching rule.
        - name: search
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of attribution events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttributionEventListResponse"

  /attribution/events/facets:
    get:
      operationId: getAttributionEventFacets
      tags: [attribution]
      summary: Distinct source and funnel values across the tenant's full attribution history
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Distinct facet values for the Source and Funnel filters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttributionEventFacetsResponse"

  /attribution/events/{id}:
    get:
      operationId: getAttributionEvent
      tags: [attribution]
      summary: Get attribution event detail with matched job and lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Attribution event detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttributionEventDetailResponse"
        "404":
          description: Event not found

  /attribution/events/{id}/revert-manual-match:
    post:
      operationId: revertAttributionEventManualMatch
      tags: [attribution]
      summary: Revert a manually-matched attribution event back to unmatched
      description: |
        Flip an attribution event with `matchLevel = "manual"` back to
        `"unmatched"` and recompute the original `unmatchedReason`. Does not
        delete the underlying field-mapping rule or per-lead funnel override
        that produced the manual match — clearing those is a separate
        operator action.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Revert succeeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevertManualMatchResponse"
        "404":
          description: Event not found
        "409":
          description: Event is not currently `manual`

  /attribution/reconcile:
    post:
      operationId: runReconciliation
      tags: [attribution]
      summary: Run attribution reconciliation engine
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                tenantId:
                  type: integer
      responses:
        "200":
          description: Reconciliation results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReconciliationResult"

  /attribution/reconciliation-status:
    get:
      operationId: getReconciliationStatus
      tags: [attribution]
      summary: Get reconciliation engine status and history
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Reconciliation status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReconciliationStatusResponse"

  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List jobs/revenue records
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, in_progress, completed, cancelled]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobListResponse"

  /tracker/submit:
    post:
      operationId: trackerSubmit
      tags: [tracker]
      summary: Receive form submission with attribution data from client-side tracker script
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrackerSubmitPayload"
      responses:
        "200":
          description: Submission processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackerSubmitResponse"

  /webhooks/ingest:
    post:
      operationId: ingestWebhook
      tags: [webhooks]
      summary: Ingest webhook from CallRail, GoHighLevel, or forms
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookIngestPayload"
      responses:
        "200":
          description: Webhook processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookIngestResponse"

  /dashboard/overview:
    get:
      operationId: getDashboardOverview
      tags: [dashboard]
      summary: Get dashboard KPI overview
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
        - name: startDate
          in: query
          schema:
            type: string

        - name: endDate
          in: query
          schema:
            type: string
        - name: attribution
          in: query
          description: |
            Filter metrics by paid attribution status. `attributed` (default)
            includes only leads/jobs matched to Google/Meta/Facebook paid
            sources or to a job with a non-`unmatched` match level.
            `unattributed` is the inverse. `all` disables the filter.
          schema:
            type: string
            enum: [attributed, unattributed, all]
            default: attributed

      responses:
        "200":
          description: Dashboard KPI data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardOverview"

  /dashboard/spend-revenue:
    get:
      operationId: getSpendRevenueChart
      tags: [dashboard]
      summary: Get spend vs revenue time series for charts
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
        - name: startDate
          in: query
          schema:
            type: string

        - name: endDate
          in: query
          schema:
            type: string
        - name: attribution
          in: query
          description: |
            See `/dashboard/overview`. When `unattributed`, spend is forced
            to zero (ad spend is by definition attributed) and revenue is
            limited to jobs without a paid match.
          schema:
            type: string
            enum: [attributed, unattributed, all]
            default: attributed

      responses:
        "200":
          description: Time series data for spend vs revenue chart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpendRevenueChartResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current session
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"

  /admin/users:
    get:
      operationId: listUsers
      tags: [admin]
      summary: List all users
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"
    post:
      operationId: createUser
      tags: [admin]
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"

  /admin/users/{userId}:
    patch:
      operationId: updateUser
      tags: [admin]
      summary: Update a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
