components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Tenant:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        serviceTitanId:
          type: string
          nullable: true
        timezone:
          type: string
        isActive:
          type: boolean
        isDemo:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, name, timezone, isActive, isDemo, createdAt]

    CreateTenantInput:
      type: object
      properties:
        name:
          type: string
        serviceTitanId:
          type: string
        timezone:
          type: string
          default: "America/New_York"
        isDemo:
          type: boolean
          default: false
      required: [name]

    UpdateTenantInput:
      type: object
      properties:
        name:
          type: string
        serviceTitanId:
          type: string
        timezone:
          type: string
        isActive:
          type: boolean
        isDemo:
          type: boolean
        stSyncPaused:
          type: boolean

    Lead:
      type: object
      properties:
        id:
          type: integer
        tenantId:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        source:
          type: string
        leadType:
          type: string
          nullable: true
        interestType:
          type: string
          nullable: true
        status:
          type: string
          enum: [new, contacted, booked, sold, lost, cancelled]
        isNewCustomer:
          type: boolean
        matchedGclid:
          type: string
          nullable: true
        assignedTo:
          type: string
          nullable: true
        disposition:
          type: string
          nullable: true
          description: |
            Operator-set disposition recorded on the lead row (e.g. "booked",
            "no_answer"). Persisted in the `leads.disposition` column and
            updated by `/leads/{leadId}` PATCH and the leads-hub action flow.
        createdAt:
          type: string
          format: date-time
      required: [id, tenantId, firstName, lastName, source, status, isNewCustomer, createdAt]

    UpdateLeadInput:
      type: object
      properties:
        status:
          type: string
          enum: [new, contacted, booked, sold, lost, cancelled]
        assignedTo:
          type: string
        disposition:
          type: string

    LeadListResponse:
      type: object
      properties:
        leads:
          type: array
          items:
            $ref: "#/components/schemas/Lead"
        total:
          type: integer
      required: [leads, total]

    HistoryEntry:
      type: object
      description: |
        A single action recorded against a lead in the leads-hub workflow.
        Sourced from the `call_attempts` table (joined with the acting CSR's
        display name). Follow-up fields like `spokeResult`, `callbackAt`,
        `appointmentDate`, and `appointmentTime` are persisted directly on
        the call attempt row so re-opening a past attempt for editing
        pre-fills the originally-chosen values. For legacy attempts written
        before these columns existed, the server falls back to attributing
        the parent lead row's mirror to the most recent
        `spoke_with_customer` attempt; everything else is null.
      properties:
        id:
          type: integer
        leadId:
          type: integer
        userId:
          type: integer
        method:
          type: string
          description: |
            Channel the action was performed on (`call`, `text`,
            `voicemail`, `voicemail_drop`, `transfer`, …). Mirrors the
            persisted `call_attempts.method` column.
        outcome:
          type: string
          description: |
            Coarse-grained outcome of the action (e.g. `answered`,
            `no_answer`, `appt_confirmed`, `transferred`).
        platform:
          type: string
          nullable: true
          description: |
            Platform the action was logged from (`native`, `podium`, …).
        attemptedAt:
          type: string
          format: date-time
        notes:
          type: string
          nullable: true
        actionType:
          type: string
          nullable: true
          description: |
            Refined action verb chosen by the operator (`call`, `text`,
            `voicemail_drop`, `transfer`). Distinct from `method` so the
            UI can re-render legacy rows that only set `method`.
        callResult:
          type: string
          nullable: true
        vmResult:
          type: string
          nullable: true
        textResult:
          type: string
          nullable: true
        deadReason:
          type: string
          nullable: true
        csrName:
          type: string
          description: Display name of the CSR who logged the action.
        spokeResult:
          type: string
          nullable: true
          description: |
            When the action was a `spoke_with_customer` call (or a
            text/voicemail equivalent), captures the sub-outcome the
            operator selected (`call_back`, `appointment_set`, `dead`).
            Persisted on `call_attempts.spoke_result` so the editor can
            pre-fill it when reopening the action. Null on actions that
            did not branch on a spoke result.
        callbackAt:
          type: string
          format: date-time
          nullable: true
          description: |
            Scheduled callback timestamp when the action's spoke result
            was `call_back`. Persisted on `call_attempts.callback_at`
            (the lead row's `callback_at` is also updated, but the
            per-attempt copy is what the editor reads back).
        appointmentDate:
          type: string
          nullable: true
          description: |
            ISO date (YYYY-MM-DD) of the appointment booked by this
            action. Persisted on `call_attempts.appointment_date`. Null
            on actions that did not book an appointment.
        appointmentTime:
          type: string
          nullable: true
          description: |
            Local time-of-day (HH:mm) of the appointment booked by this
            action. Persisted on `call_attempts.appointment_time`. Null
            on actions that did not book an appointment.
      required: [id, leadId, userId, method, outcome, attemptedAt, csrName]

    LeadHistoryResponse:
      type: object
      properties:
        history:
          type: array
          items:
            $ref: "#/components/schemas/HistoryEntry"
      required: [history]

    LeadStatusHistoryEntry:
      type: object
      description: |
        A single row from the `lead_status_history` append-only audit
        log, recording one hub-status transition for a lead.
      properties:
        id:
          type: integer
        leadId:
          type: integer
        fromStatus:
          type: string
          nullable: true
          description: |
            Prior `hub_status` before the transition, or `null` for the
            very first row in a lead's history.
        toStatus:
          type: string
          description: New `hub_status` after the transition.
        changedAt:
          type: string
          format: date-time
        changedByUserId:
          type: integer
          nullable: true
          description: |
            ID of the user who drove the transition, or `null` for
            system-driven changes (e.g. day-sequence advancement,
            backfill).
        changedByName:
          type: string
          nullable: true
          description: |
            Display name of the user who drove the transition, joined
            from `users.name`. Null when `changedByUserId` is null or
            the user has been deleted.
        reason:
          type: string
          nullable: true
          description: |
            Optional free-form reason recorded with the transition
            (e.g. dead reason, `appointment_canceled`).
      required: [id, leadId, toStatus, changedAt]

    LeadStatusHistoryResponse:
      type: object
      properties:
        history:
          type: array
          items:
            $ref: "#/components/schemas/LeadStatusHistoryEntry"
      required: [history]

    TimelineEntry:
      type: object
      description: |
        A single entry in the unified Pulse + Podium timeline for a
        lead. Discriminated by `type`: `pulse_action` entries are
        sourced from `call_attempts` and carry the same fields as
        `HistoryEntry`; `podium_text` and `podium_call` entries are
        sourced from `podium_messages` and carry Podium-specific fields
        (direction, body, channelType, …). Variant-specific fields are
        omitted on entries from other variants.
      properties:
        type:
          type: string
          enum: [pulse_action, podium_text, podium_call, status_change]
          description: |
            Discriminator. `pulse_action` is a native Pulse
            call/text/voicemail attempt; `podium_text` is a Podium SMS
            or form message; `podium_call` is a Podium-tracked phone
            call; `status_change` is an entry from the durable
            `lead_status_history` audit log (a hub-status transition).
        source:
          type: string
          enum: [pulse, podium]
          description: |
            Origin system that produced the entry. `pulse_action` rows
            always have source `pulse`; `podium_text` and `podium_call`
            rows always have source `podium`.
        timestamp:
          type: string
          format: date-time
          description: |
            Unified sort timestamp. For pulse actions this is the
            attempt's `attemptedAt`; for Podium entries it is
            `podiumCreatedAt` if available, otherwise the local
            `createdAt`.
        id:
          type: integer
          description: |
            Identifier of the underlying row. `call_attempts.id` for
            pulse actions; `podium_messages.id` for Podium entries.
            Not globally unique across variants.

        leadId:
          type: integer
          description: Pulse-action only. Mirrors `HistoryEntry.leadId`.
        userId:
          type: integer
          description: Pulse-action only. Mirrors `HistoryEntry.userId`.
        method:
          type: string
          description: Pulse-action only. Mirrors `HistoryEntry.method`.
        outcome:
          type: string
          description: Pulse-action only. Mirrors `HistoryEntry.outcome`.
        platform:
          type: string
          nullable: true
          description: Pulse-action only. Mirrors `HistoryEntry.platform`.
        notes:
          type: string
          nullable: true
          description: Pulse-action only. Mirrors `HistoryEntry.notes`.
        actionType:
          type: string
          nullable: true
          description: Pulse-action only. Mirrors `HistoryEntry.actionType`.
        callResult:
          type: string
          nullable: true
          description: Pulse-action only. Mirrors `HistoryEntry.callResult`.
        vmResult:
          type: string
          nullable: true
          description: Pulse-action only. Mirrors `HistoryEntry.vmResult`.
        textResult:
          type: string
          nullable: true
          description: Pulse-action only. Mirrors `HistoryEntry.textResult`.
        deadReason:
          type: string
          nullable: true
          description: Pulse-action only. Mirrors `HistoryEntry.deadReason`.
        csrName:
          type: string
          description: Pulse-action only. Mirrors `HistoryEntry.csrName`.
        spokeResult:
          type: string
          nullable: true
          description: Pulse-action only. Mirrors `HistoryEntry.spokeResult`.
        callbackAt:
          type: string
          format: date-time
          nullable: true
          description: Pulse-action only. Mirrors `HistoryEntry.callbackAt`.
        appointmentDate:
          type: string
          nullable: true
          description: Pulse-action only. Mirrors `HistoryEntry.appointmentDate`.
        appointmentTime:
          type: string
          nullable: true
          description: Pulse-action only. Mirrors `HistoryEntry.appointmentTime`.

        direction:
          type: string
          description: |
            Podium-only. `inbound` or `outbound` direction of the
            message or call.
        body:
          type: string
          nullable: true
          description: |
            Podium-only. Message body for texts; transcript or notes
            for calls. May be null when Podium provided no body.
        channelType:
          type: string
          description: |
            Podium-only. Normalised channel of the entry (`sms`,
            `form`, `call`, `phone_call`, `car_wars`, …). Drives which
            Podium variant the entry is rendered as.
        senderName:
          type: string
          nullable: true
          description: Podium-only. Display name of the Podium sender.
        deliveryStatus:
          type: string
          nullable: true
          description: |
            Podium-only. Podium-reported delivery status (e.g.
            `delivered`, `failed`).
        podiumMessageUid:
          type: string
          description: Podium-only. Stable Podium message UID.
        podiumConversationUid:
          type: string
          nullable: true
          description: |
            Podium-only. UID of the Podium conversation the entry
            belongs to. Used to build the Podium deep link.
        podiumDeepLink:
          type: string
          nullable: true
          description: |
            Podium-only. Pre-built URL into the Podium inbox for the
            conversation. Null when the conversation UID is missing.
        messageItems:
          nullable: true
          description: |
            Podium-only. Raw Podium `items` payload (text, image, or
            other attachment descriptors). Forwarded as-is so the UI
            can render attachments without a second fetch.

        fromStatus:
          type: string
          nullable: true
          description: |
            Status-change only. The lead's prior `hub_status` before
            this transition, or `null` for the very first row.
        toStatus:
          type: string
          description: |
            Status-change only. The lead's `hub_status` after this
            transition.
        reason:
          type: string
          nullable: true
          description: |
            Status-change only. Free-form reason recorded with the
            transition (e.g. dead reason, `appointment_canceled`).
        changedByUserId:
          type: integer
          nullable: true
          description: |
