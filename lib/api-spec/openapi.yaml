    LeaderboardEntry:
      type: object
      required: [tenantId, tenantName, metricValue, previousValue, trend, rank, closeRate, revenue, cpl, bookingRate, roas, totalLeads, spend, isOutlier, products]
      properties:
        tenantId:
          type: integer
        tenantName:
          type: string
        metricValue:
          type: number
        previousValue:
          type: number
        trend:
          type: number
        rank:
          type: integer
        closeRate:
          type: number
        revenue:
          type: number
        cpl:
          type: number
        bookingRate:
          type: number
        roas:
          type: number
        totalLeads:
          type: integer
        spend:
          type: number
        isOutlier:
          type: boolean
        outlierDirection:
          type: string
          nullable: true
        isOwnTenant:
          type: boolean
          description: |
            True when this row represents the caller's own tenant. Set so
            that the marketing dashboard can highlight the caller's row even
            in anonymised views (where the displayed `tenantName` is masked
            to e.g. "Client A"). Always set on the response; defaults to
            false for cross-tenant rows.
        products:
          type: array
          items:
            $ref: "#/components/schemas/LeaderboardProduct"

    LeaderboardResponse:
      type: object
      required: [metric, period, previousPeriod, agencyAverage, rankings]
      properties:
        metric:
          type: string
        period:
          type: object
          properties:
            start:
              type: string
            end:
              type: string
        previousPeriod:
          type: object
          properties:
            start:
              type: string
            end:
              type: string
        agencyAverage:
          type: number
        rankings:
          type: array
          items:
            $ref: "#/components/schemas/LeaderboardEntry"
        forceAnonymized:
          type: boolean
          description: |
            True when the server forced anonymisation of cross-tenant
            `tenantName` values (e.g. because the caller's role does not
            permit seeing other tenants by name). The client should treat
            this as a hard override that wins over any local "named view"
            toggle.
