openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Marketing OS API - Attribution Engine & Leads Dashboard
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: tenants
    description: Tenant management
  - name: leads
    description: Lead management
  - name: campaigns
    description: Campaign and ad spend data
  - name: attribution
    description: Attribution events and matching
  - name: jobs
    description: ServiceTitan job/revenue data
  - name: webhooks
    description: Webhook ingestion endpoints
  - name: dashboard
    description: Dashboard analytics and KPIs
  - name: auth
    description: Authentication
  - name: admin
    description: Admin portal management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /tenants:
    get:
      operationId: listTenants
      tags: [tenants]
      summary: List all tenants
      responses:
        "200":
          description: List of tenants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tenant"
    post:
      operationId: createTenant
      tags: [tenants]
      summary: Create a new tenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTenantInput"
      responses:
        "201":
          description: Tenant created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"

  /tenants/{tenantId}:
    get:
      operationId: getTenant
      tags: [tenants]
      summary: Get tenant by ID
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tenant details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
    patch:
      operationId: updateTenant
      tags: [tenants]
      summary: Update a tenant
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTenantInput"
      responses:
        "200":
          description: Updated tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
    delete:
      operationId: deleteTenant
      tags: [tenants]
      summary: Soft-delete (deactivate) a tenant
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tenant deactivated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string

  /leads:
    get:
      operationId: listLeads
      tags: [leads]
      summary: List leads with optional filters
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [new, contacted, booked, sold, lost, cancelled]
        - name: source
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of leads
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadListResponse"

  /leads/{leadId}:
    get:
      operationId: getLead
      tags: [leads]
      summary: Get lead by ID
      parameters:
        - name: leadId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lead details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
    patch:
      operationId: updateLead
      tags: [leads]
      summary: Update lead status or details
      parameters:
        - name: leadId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLeadInput"
      responses:
        "200":
          description: Updated lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"

  /campaigns:
    get:
      operationId: listCampaigns
      tags: [campaigns]
      summary: List campaigns
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
        - name: platform
          in: query
          schema:
            type: string
            enum: [google, meta]
      responses:
        "200":
          description: List of campaigns
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Campaign"

  /campaigns/stats:
    get:
      operationId: getCampaignStats
      tags: [campaigns]
      summary: Get aggregated campaign stats
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Aggregated campaign statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignStatsResponse"

  /attribution/events:
    get:
      operationId: listAttributionEvents
      tags: [attribution]
      summary: List attribution events
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
        - name: matchLevel
          in: query
          schema:
            type: string
            enum: [diamond, golden, silver, bronze, unmatched]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of attribution events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttributionEventListResponse"

  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List jobs/revenue records
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, in_progress, completed, cancelled]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobListResponse"

  /webhooks/ingest:
    post:
      operationId: ingestWebhook
      tags: [webhooks]
      summary: Ingest webhook from CallRail, GoHighLevel, or forms
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookIngestPayload"
      responses:
        "200":
          description: Webhook processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookIngestResponse"

  /dashboard/overview:
    get:
      operationId: getDashboardOverview
      tags: [dashboard]
      summary: Get dashboard KPI overview
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Dashboard KPI data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardOverview"

  /dashboard/spend-revenue:
    get:
      operationId: getSpendRevenueChart
      tags: [dashboard]
      summary: Get spend vs revenue time series for charts
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Time series data for spend vs revenue chart
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SpendRevenueDataPoint"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current session
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"

  /admin/users:
    get:
      operationId: listUsers
      tags: [admin]
      summary: List all users
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"
    post:
      operationId: createUser
      tags: [admin]
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"

  /admin/users/{userId}:
    patch:
      operationId: updateUser
      tags: [admin]
      summary: Update a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserInput"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"

  /admin/dashboard-stats:
    get:
      operationId: getAdminDashboardStats
      tags: [admin]
      summary: Get aggregated stats for all tenants (Command Center)
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Admin dashboard stats with agency averages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDashboardStats"

  /change-logs:
    get:
      operationId: listChangeLogs
      tags: [dashboard]
      summary: List change logs for a tenant
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: List of change logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChangeLog"
    post:
      operationId: createChangeLog
      tags: [dashboard]
      summary: Create a change log entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChangeLogInput"
      responses:
        "201":
          description: Change log created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChangeLog"

  /dashboard/tenant-performance:
    get:
      operationId: getTenantPerformance
      tags: [dashboard]
      summary: Get all tenants performance table (agency God View)
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Performance data for all tenants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TenantPerformanceRow"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Tenant:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        serviceTitanId:
          type: string
          nullable: true
        timezone:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, name, timezone, isActive, createdAt]

    CreateTenantInput:
      type: object
      properties:
        name:
          type: string
        serviceTitanId:
          type: string
        timezone:
          type: string
          default: "America/New_York"
      required: [name]

    UpdateTenantInput:
      type: object
      properties:
        name:
          type: string
        serviceTitanId:
          type: string
        timezone:
          type: string
        isActive:
          type: boolean

    Lead:
      type: object
      properties:
        id:
          type: integer
        tenantId:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        source:
          type: string
        leadType:
          type: string
          nullable: true
        interestType:
          type: string
          nullable: true
        status:
          type: string
          enum: [new, contacted, booked, sold, lost, cancelled]
        isNewCustomer:
          type: boolean
        matchedGclid:
          type: string
          nullable: true
        assignedTo:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, tenantId, firstName, lastName, source, status, isNewCustomer, createdAt]

    UpdateLeadInput:
      type: object
      properties:
        status:
          type: string
          enum: [new, contacted, booked, sold, lost, cancelled]
        assignedTo:
          type: string
        disposition:
          type: string

    LeadListResponse:
      type: object
      properties:
        leads:
          type: array
          items:
            $ref: "#/components/schemas/Lead"
        total:
          type: integer
      required: [leads, total]

    Campaign:
      type: object
      properties:
        id:
          type: integer
        tenantId:
          type: integer
        platform:
          type: string
          enum: [google, meta]
        externalId:
          type: string
        name:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, tenantId, platform, externalId, name, status, createdAt]

    CampaignStatsResponse:
      type: object
      properties:
        totalSpend:
          type: number
        totalImpressions:
          type: integer
        totalClicks:
          type: integer
        totalConversions:
          type: integer
        avgCpc:
          type: number
        avgCpl:
          type: number
        dailyStats:
          type: array
          items:
            $ref: "#/components/schemas/DailyStatRow"
      required: [totalSpend, totalImpressions, totalClicks, totalConversions, avgCpc, avgCpl, dailyStats]

    DailyStatRow:
      type: object
      properties:
        date:
          type: string
          format: date
        spend:
          type: number
        impressions:
          type: integer
        clicks:
          type: integer
        conversions:
          type: integer
      required: [date, spend, impressions, clicks, conversions]

    AttributionEvent:
      type: object
      properties:
        id:
          type: integer
        tenantId:
          type: integer
        eventType:
          type: string
          enum: [click, call, form_fill]
        gclid:
          type: string
          nullable: true
        wbraid:
          type: string
          nullable: true
        fbclid:
          type: string
          nullable: true
        hashedPhone:
          type: string
          nullable: true
        hashedEmail:
          type: string
          nullable: true
        billingAddress:
          type: string
          nullable: true
        utmSource:
          type: string
          nullable: true
        utmCampaign:
          type: string
          nullable: true
        utmMedium:
          type: string
          nullable: true
        landingPage:
          type: string
          nullable: true
        matchLevel:
          type: string
          enum: [diamond, golden, silver, bronze, unmatched]
          nullable: true
        matchConfidence:
          type: number
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, tenantId, eventType, createdAt]

    AttributionEventListResponse:
      type: object
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/AttributionEvent"
        total:
          type: integer
      required: [events, total]

    Job:
      type: object
      properties:
        id:
          type: integer
        tenantId:
          type: integer
        stJobId:
          type: string
          nullable: true
        customerName:
          type: string
        jobType:
          type: string
        revenue:
          type: number
        status:
          type: string
          enum: [pending, in_progress, completed, cancelled]
        matchedGclid:
          type: string
          nullable: true
        matchLevel:
          type: string
          enum: [diamond, golden, silver, bronze, unmatched]
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, tenantId, customerName, jobType, revenue, status, createdAt]

    JobListResponse:
      type: object
      properties:
        jobs:
          type: array
          items:
            $ref: "#/components/schemas/Job"
        total:
          type: integer
      required: [jobs, total]

    WebhookIngestPayload:
      type: object
      properties:
        source:
          type: string
          enum: [callrail, ghl, form, manual]
        tenantId:
          type: integer
          description: Target tenant for this webhook event
        data:
          type: object
          properties:
            phone:
              type: string
            email:
              type: string
            gclid:
              type: string
            firstName:
              type: string
            lastName:
              type: string
            landingPage:
              type: string
            utmSource:
              type: string
            utmCampaign:
              type: string
            utmMedium:
              type: string
          additionalProperties: true
      required: [source, tenantId, data]

    WebhookIngestResponse:
      type: object
      properties:
        success:
          type: boolean
        eventId:
          type: integer
        message:
          type: string
      required: [success, message]

    DashboardOverview:
      type: object
      properties:
        totalSpend:
          type: number
        totalRevenue:
          type: number
        roas:
          type: number
        totalLeads:
          type: integer
        bookedLeads:
          type: integer
        soldLeads:
          type: integer
        bookingRate:
          type: number
        closeRate:
          type: number
        avgSaleValue:
          type: number
        cpl:
          type: number
        attributionMatchRate:
          type: number
        previousPeriod:
          type: object
          properties:
            totalSpend:
              type: number
            totalRevenue:
              type: number
            roas:
              type: number
            totalLeads:
              type: integer
            bookedLeads:
              type: integer
            soldLeads:
              type: integer
            bookingRate:
              type: number
            closeRate:
              type: number
            avgSaleValue:
              type: number
            cpl:
              type: number
            attributionMatchRate:
              type: number
          nullable: true
      required: [totalSpend, totalRevenue, roas, totalLeads, bookedLeads, soldLeads, bookingRate, closeRate, avgSaleValue, cpl, attributionMatchRate]

    SpendRevenueDataPoint:
      type: object
      properties:
        date:
          type: string
          format: date
        spend:
          type: number
        revenue:
          type: number
      required: [date, spend, revenue]

    TenantPerformanceRow:
      type: object
      properties:
        tenantId:
          type: integer
        tenantName:
          type: string
        mtdSpend:
          type: number
        mtdRevenue:
          type: number
        cpl:
          type: number
        bookingRate:
          type: number
        closeRate:
          type: number
        roas:
          type: number
        leadCount:
          type: integer
      required: [tenantId, tenantName, mtdSpend, mtdRevenue, cpl, bookingRate, closeRate, roas, leadCount]

    LoginInput:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]

    AuthUser:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [super_admin, agency_user, client_admin, client_user]
        tenantId:
          type: integer
          nullable: true
        tenantName:
          type: string
          nullable: true
      required: [id, email, name, role]

    AdminUser:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [super_admin, agency_user, client_admin, client_user]
        tenantId:
          type: integer
          nullable: true
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, email, name, role, isActive, createdAt]

    CreateUserInput:
      type: object
      properties:
        email:
          type: string
        name:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [super_admin, agency_user, client_admin, client_user]
        tenantId:
          type: integer
          nullable: true
      required: [email, name, password, role]

    UpdateUserInput:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [super_admin, agency_user, client_admin, client_user]
        tenantId:
          type: integer
          nullable: true
        isActive:
          type: boolean

    AdminTenantStats:
      type: object
      properties:
        tenantId:
          type: integer
        tenantName:
          type: string
        mtdSpend:
          type: number
        mtdRevenue:
          type: number
        projectedSpend:
          type: number
        monthlyBudget:
          type: number
        cpl:
          type: number
        bookingRate:
          type: number
        closeRate:
          type: number
        roas:
          type: number
        totalLeads:
          type: integer
        bookedLeads:
          type: integer
        soldLeads:
          type: integer
      required: [tenantId, tenantName, mtdSpend, mtdRevenue, projectedSpend, monthlyBudget, cpl, bookingRate, closeRate, roas, totalLeads, bookedLeads, soldLeads]

    AgencyAverages:
      type: object
      properties:
        cpl:
          type: number
        roas:
          type: number
        bookingRate:
          type: number
        totalSpend:
          type: number
        totalRevenue:
          type: number
        totalLeads:
          type: integer
      required: [cpl, roas, bookingRate, totalSpend, totalRevenue, totalLeads]

    AdminDashboardStats:
      type: object
      properties:
        tenants:
          type: array
          items:
            $ref: "#/components/schemas/AdminTenantStats"
        agencyAverages:
          $ref: "#/components/schemas/AgencyAverages"
      required: [tenants, agencyAverages]

