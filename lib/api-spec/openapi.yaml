openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Optics API - Attribution Engine & Leads Dashboard
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: tenants
    description: Tenant management
  - name: leads
    description: Lead management
  - name: campaigns
    description: Campaign and ad spend data
  - name: attribution
    description: Attribution events and matching
  - name: jobs
    description: ServiceTitan job/revenue data
  - name: webhooks
    description: Webhook ingestion endpoints
  - name: dashboard
    description: Dashboard analytics and KPIs
  - name: auth
    description: Authentication
  - name: admin
    description: Admin portal management
  - name: training
    description: Training & LMS upsell engine

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /tenants:
    get:
      operationId: listTenants
      tags: [tenants]
      summary: List all tenants
      responses:
        "200":
          description: List of tenants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tenant"
    post:
      operationId: createTenant
      tags: [tenants]
      summary: Create a new tenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTenantInput"
      responses:
        "201":
          description: Tenant created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"

  /tenants/{tenantId}:
    get:
      operationId: getTenant
      tags: [tenants]
      summary: Get tenant by ID
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tenant details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
    patch:
      operationId: updateTenant
      tags: [tenants]
      summary: Update a tenant
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTenantInput"
      responses:
        "200":
          description: Updated tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
    delete:
      operationId: deleteTenant
      tags: [tenants]
      summary: Soft-delete (deactivate) a tenant
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tenant deactivated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string

  /leads/hud/queue:
    get:
      operationId: getHudQueue
      tags: [leads]
      summary: Get lead HUD focus queue (new, follow-ups, background)
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Categorized lead queue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HudQueueResponse"

  /leads/hud/stats:
    get:
      operationId: getHudStats
      tags: [leads]
      summary: Get lead coordinator performance stats for today
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: HUD performance statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HudStats"

  /leads:
    get:
      operationId: listLeads
      tags: [leads]
      summary: List leads with optional filters
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [new, contacted, booked, sold, lost, cancelled]
        - name: source
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: funnelId
          in: query
          schema:
            type: integer
        - name: startDate
          in: query
          schema:
            type: string

        - name: endDate
          in: query
          schema:
            type: string

      responses:
        "200":
          description: List of leads
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadListResponse"

  /leads/{leadId}:
    get:
      operationId: getLead
      tags: [leads]
      summary: Get lead by ID
      parameters:
        - name: leadId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lead details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
    patch:
      operationId: updateLead
      tags: [leads]
      summary: Update lead status or details
      parameters:
        - name: leadId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLeadInput"
      responses:
        "200":
          description: Updated lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"

  /campaigns:
    get:
      operationId: listCampaigns
      tags: [campaigns]
      summary: List campaigns
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
        - name: platform
          in: query
          schema:
            type: string
            enum: [google, meta]
      responses:
        "200":
          description: List of campaigns
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Campaign"

  /campaigns/stats:
    get:
      operationId: getCampaignStats
      tags: [campaigns]
      summary: Get aggregated campaign stats
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
        - name: startDate
          in: query
          schema:
            type: string

        - name: endDate
          in: query
          schema:
            type: string

      responses:
        "200":
          description: Aggregated campaign statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignStatsResponse"

  /attribution/events:
    get:
      operationId: listAttributionEvents
      tags: [attribution]
      summary: List attribution events
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
        - name: matchLevel
          in: query
          schema:
            type: string
            enum: [diamond, golden, silver, bronze, unmatched]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of attribution events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttributionEventListResponse"

  /attribution/events/{id}:
    get:
      operationId: getAttributionEvent
      tags: [attribution]
      summary: Get attribution event detail with matched job and lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Attribution event detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttributionEventDetailResponse"
        "404":
          description: Event not found

  /attribution/reconcile:
    post:
      operationId: runReconciliation
      tags: [attribution]
      summary: Run attribution reconciliation engine
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                tenantId:
                  type: integer
      responses:
        "200":
          description: Reconciliation results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReconciliationResult"

  /attribution/reconciliation-status:
    get:
      operationId: getReconciliationStatus
      tags: [attribution]
      summary: Get reconciliation engine status and history
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Reconciliation status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReconciliationStatusResponse"

  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List jobs/revenue records
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, in_progress, completed, cancelled]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobListResponse"

  /tracker/submit:
    post:
      operationId: trackerSubmit
      tags: [tracker]
      summary: Receive form submission with attribution data from client-side tracker script
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrackerSubmitPayload"
      responses:
        "200":
          description: Submission processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackerSubmitResponse"

  /webhooks/ingest:
    post:
      operationId: ingestWebhook
      tags: [webhooks]
      summary: Ingest webhook from CallRail, GoHighLevel, or forms
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookIngestPayload"
      responses:
        "200":
          description: Webhook processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookIngestResponse"

  /dashboard/overview:
    get:
      operationId: getDashboardOverview
      tags: [dashboard]
      summary: Get dashboard KPI overview
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
        - name: startDate
          in: query
          schema:
            type: string

        - name: endDate
          in: query
          schema:
            type: string

      responses:
        "200":
          description: Dashboard KPI data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardOverview"

  /dashboard/spend-revenue:
    get:
      operationId: getSpendRevenueChart
      tags: [dashboard]
      summary: Get spend vs revenue time series for charts
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
        - name: startDate
          in: query
          schema:
            type: string

        - name: endDate
          in: query
          schema:
            type: string

      responses:
        "200":
          description: Time series data for spend vs revenue chart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpendRevenueChartResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current session
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"

  /admin/users:
    get:
      operationId: listUsers
      tags: [admin]
      summary: List all users
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"
    post:
      operationId: createUser
      tags: [admin]
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"

  /admin/users/{userId}:
    patch:
      operationId: updateUser
      tags: [admin]
      summary: Update a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserInput"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"

  /automation/rules:
    get:
      operationId: listAutomationRules
      tags: [automation]
      summary: List all automation rules
      responses:
        "200":
          description: List of automation rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AutomationRule"
    post:
      operationId: createAutomationRule
      tags: [automation]
      summary: Create an automation rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAutomationRuleBody"
      responses:
        "201":
          description: Rule created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationRule"

  /automation/rules/{id}:
    put:
      operationId: updateAutomationRule
      tags: [automation]
      summary: Update an automation rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAutomationRuleBody"
      responses:
        "200":
          description: Rule updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationRule"
    delete:
      operationId: deleteAutomationRule
      tags: [automation]
      summary: Delete an automation rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rule deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /automation/rules/{id}/toggle:
    patch:
      operationId: toggleAutomationRule
      tags: [automation]
      summary: Toggle automation rule enabled/disabled
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rule toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationRule"

  /automation/alerts:
    get:
      operationId: listAutomationAlerts
      tags: [automation]
      summary: List automation alerts
      parameters:
        - name: acknowledged
          in: query
          schema:
            type: string
            enum: ["true", "false"]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: List of automation alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AutomationAlert"

  /automation/alerts/{id}/acknowledge:
    patch:
      operationId: acknowledgeAutomationAlert
      tags: [automation]
      summary: Acknowledge an automation alert
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Alert acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationAlert"

  /automation/alerts/count:
    get:
      operationId: getAutomationAlertCount
      tags: [automation]
      summary: Get count of unacknowledged alerts
      responses:
        "200":
          description: Alert count
          content:
            application/json:
              schema:
                type: object
                properties:
                  unacknowledged:
                    type: integer

  /admin/leaderboard:
    get:
      operationId: getAdminLeaderboard
      tags: [admin]
      summary: Get cross-client leaderboard with ranked performance and trends
      parameters:
        - name: metric
          in: query
          schema:
            type: string
            enum: [closeRate, revenue, cpl, bookingRate]
            default: closeRate
      responses:
        "200":
          description: Leaderboard rankings with agency average and outlier detection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaderboardResponse"

  /admin/dashboard-stats:
    get:
      operationId: getAdminDashboardStats
      tags: [admin]
      summary: Get aggregated stats for all tenants (Command Center)
      parameters:
        - name: startDate
          in: query
          schema:
            type: string

        - name: endDate
          in: query
          schema:
            type: string

      responses:
        "200":
          description: Admin dashboard stats with agency averages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDashboardStats"

  /change-logs:
    get:
      operationId: listChangeLogs
      tags: [dashboard]
      summary: List change logs for a tenant
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
        - name: startDate
          in: query
          schema:
            type: string

        - name: endDate
          in: query
          schema:
            type: string

      responses:
        "200":
          description: List of change logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChangeLog"
    post:
      operationId: createChangeLog
      tags: [dashboard]
      summary: Create a change log entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChangeLogInput"
      responses:
        "201":
          description: Change log created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChangeLog"

  /dashboard/benchmarks:
    get:
      operationId: getDashboardBenchmarks
      tags: [dashboard]
      summary: Get agency-wide benchmark averages (available to all authenticated users)
      parameters:
        - name: startDate
          in: query
          schema:
            type: string

        - name: endDate
          in: query
          schema:
            type: string

      responses:
        "200":
          description: Agency-wide average metrics for benchmarking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BenchmarkData"

  /dashboard/tenant-performance:
    get:
      operationId: getTenantPerformance
      tags: [dashboard]
      summary: Get all tenants performance table (agency God View)
      parameters:
        - name: startDate
          in: query
          schema:
            type: string

        - name: endDate
          in: query
          schema:
            type: string

      responses:
        "200":
          description: Performance data for all tenants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TenantPerformanceRow"

  /training/items:
    get:
      operationId: listTrainingItems
      tags: [training]
      summary: List all training items
      parameters:
        - name: activeOnly
          in: query
          schema:
            type: string
            default: "true"
      responses:
        "200":
          description: List of training items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrainingItem"
    post:
      operationId: createTrainingItem
      tags: [training]
      summary: Create a training item (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, description, category]
              properties:
                title:
                  type: string
                description:
                  type: string
                category:
                  type: string
                contentType:
                  type: string
                  enum: [free_tip, paid_course]
                metricTrigger:
                  type: string
                  enum: [booking_rate, close_rate, cpl, roas, avg_sale_value]
                  nullable: true
                thresholdValue:
                  type: number
                  nullable: true
                thresholdDirection:
                  type: string
                  enum: [below, above]
                price:
                  type: number
                  nullable: true
                url:
                  type: string
                  nullable: true
                thumbnailUrl:
                  type: string
                  nullable: true
                sortOrder:
                  type: integer
                isActive:
                  type: boolean
      responses:
        "201":
          description: Created training item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingItem"

  /training/items/{id}:
    put:
      operationId: updateTrainingItem
      tags: [training]
      summary: Update a training item (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                category:
                  type: string
                contentType:
                  type: string
                  enum: [free_tip, paid_course]
                metricTrigger:
                  type: string
                  nullable: true
                thresholdValue:
                  type: number
                  nullable: true
                thresholdDirection:
                  type: string
                  enum: [below, above]
                price:
                  type: number
                  nullable: true
                url:
                  type: string
                  nullable: true
                sortOrder:
                  type: integer
                isActive:
                  type: boolean
      responses:
        "200":
          description: Updated training item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingItem"
    delete:
      operationId: deleteTrainingItem
      tags: [training]
      summary: Delete a training item (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /training/contextual:
    get:
      operationId: getContextualTraining
      tags: [training]
      summary: Get training items triggered by current tenant metrics
      responses:
        "200":
          description: Contextual training items and current metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingContextualResponse"

  /training/dismiss/{id}:
    post:
      operationId: dismissTraining
      tags: [training]
      summary: Dismiss a training item for current user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Dismissed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /training/check-alerts:
    post:
      operationId: checkTrainingAlerts
      tags: [training]
      summary: Check all tenants for metric threshold breaches (admin only)
      responses:
        "200":
          description: Alert check results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingAlertResponse"

  /training/purchase/{id}:
    post:
      operationId: purchaseTrainingItem
      tags: [training]
      summary: Purchase a paid training course
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Purchase created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingPurchaseResponse"
        "200":
          description: Already purchased
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingPurchaseResponse"

  /training/purchases:
    get:
      operationId: listMyTrainingPurchases
      tags: [training]
      summary: List current user's training purchases
      responses:
        "200":
          description: User purchases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrainingPurchase"

  /training/purchases/all:
    get:
      operationId: listAllTrainingPurchases
      tags: [training]
      summary: List all training purchases (admin only)
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: All purchases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrainingPurchase"

