    AttributionEvent:
      type: object
      properties:
        id:
          type: integer
        tenantId:
          type: integer
        eventType:
          type: string
          enum: [click, call, form_fill]
        gclid:
          type: string
          nullable: true
        wbraid:
          type: string
          nullable: true
        fbclid:
          type: string
          nullable: true
        msclkid:
          type: string
          nullable: true
        ttclid:
          type: string
          nullable: true
        liFatId:
          type: string
          nullable: true
        hashedPhone:
          type: string
          nullable: true
        hashedEmail:
          type: string
          nullable: true
        billingAddress:
          type: string
          nullable: true
        utmSource:
          type: string
          nullable: true
        utmCampaign:
          type: string
          nullable: true
        utmMedium:
          type: string
          nullable: true
        utmTerm:
          type: string
          nullable: true
        utmContent:
          type: string
          nullable: true
        landingPage:
          type: string
          nullable: true
        pageUrl:
          type: string
          nullable: true
        referrer:
          type: string
          nullable: true
        userAgent:
          type: string
          nullable: true
        externalId:
          type: string
          nullable: true
        formType:
          type: string
          nullable: true
        formId:
          type: string
          nullable: true
        formName:
          type: string
          nullable: true
        resolvedLeadSource:
          type: string
          nullable: true
          description: |
            Canonicalised lead source after running raw `utm_source` /
            `referrer` through the tenant's lead-source aliases. Set on
            insert by the tracker / webhook ingestion paths and surfaced
            verbatim on read; null on legacy rows.
        resolvedFunnel:
          type: string
          nullable: true
          description: |
            Canonicalised funnel name (matches `funnel_types.name`) after
            running raw form / URL signals through funnel aliases. Set on
            insert; null on legacy rows or when no funnel could be resolved.
        detectedMappings:
          type: object
          description: |
            Per-field mapping decisions made by the auto-detection pipeline
            for this submission. Keys are the raw submitted field names
            (e.g. `field_3`); values describe what target the value was
            mapped to and how confident the heuristic was.
          additionalProperties:
            type: object
            properties:
              mapsTo:
                type: string
                description: |
                  The semantic target (e.g. `phone`, `email`, `funnel`,
                  `firstName`).
              method:
                type: string
                description: |
                  How the mapping was decided — typically `saved_rule`,
                  `value_pattern`, or `field_name`.
              confidence:
                type: number
                description: 0–1 confidence score for the mapping decision.
            required: [mapsTo, method, confidence]
          nullable: true
        createdLeadId:
          type: integer
          nullable: true
          description: |
            ID of the `leads` row this attribution event created (or
            re-attached to, in the case of resubmissions). Null when the
            event was ingested without producing a lead, or for legacy rows
            written before the column existed.
        formFields:
          type: object
          description: |
            Flat record of submitted form values keyed by field name (e.g.
            `{ phone: "555-1234", email: "a@b.com", field_3: "Acme" }`).
            Keys prefixed with `_` (e.g. `_consent`, `_source`) are reserved
            for internal bookkeeping and should not be displayed to end users.
            Values are surfaced verbatim from the original submission and may
            contain raw PII, so this field is operator-only: the entire
            `/attribution/*` route group is gated by the `denyClientUser`
            middleware and tenant-scoped client users will never see it.
          additionalProperties: true
          example:
            phone: "555-123-4567"
            email: "jane@example.com"
            firstName: "Jane"
            field_3: "Acme Inc."
            _source: "homepage_hero"
          nullable: true
        fieldNames:
          type: array
          description: |
            PII-safe form field NAMES (Object.keys, no `_*` keys, capped at 30).
            Populated on the event detail response so operators can map an
            unrecognised field name (e.g. `field_3`) to a semantic target
            (phone, email, …) for any past unmatched fill — not just live ones.
          items:
            type: string
          nullable: true
        unmatchedReason:
          type: string
          description: |
            One-line diagnosis of why an event ended up matchLevel === "unmatched".
            Persisted on the event row at insert time (column unmatched_reason)
            so audit trails and old screenshots stay reproducible even if the
            heuristic is reworded later. Null on matched events and on legacy
            rows written before the column existed; for those legacy unmatched
            rows the detail endpoint recomputes on read using the same shared
            helper as the live socket emit.
          nullable: true
        submittedAt:
          type: string
          format: date-time
          nullable: true
        matchLevel:
          type: string
          enum: [diamond, golden, silver, bronze, manual, unmatched]
          nullable: true
        matchConfidence:
          type: number
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, tenantId, eventType, createdAt]

